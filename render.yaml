# Render Blueprint: https://docs.render.com/docs/infrastructure-as-code
# Apply from the repo root, or copy build/start commands into a manual Web Service (root directory: backend).

databases:
  - name: smartsched-db
    plan: free
    databaseName: smartsched

services:
  - type: web
    name: smartsched-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartsched-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGINS
        sync: false
